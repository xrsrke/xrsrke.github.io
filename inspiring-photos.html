<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspiring Photos - Phuc Nguyen</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .photos {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }
        .photo figure {
            margin: 0;
        }
        .photo img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }
        .photo figcaption {
            margin-top: 8px;
            font-size: 14px;
            color: #666;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <nav class="nav-links">
                <a href="index.html">← Back to Home</a>
            </nav>
            <h1 class="name">Photos</h1>
        </header>

        <section class="photos">
            <figure class="photo">
                <img src="kardashev-scale.png" alt="The Kardashev Scale: we aspire to be a galactic civilization">
                <figcaption>The Kardashev Scale — we aspire to be a galactic civilization (Type III: harness all the energy in a galaxy).</figcaption>
            </figure>
        </section>

    </main>
</body>
